type Query {
  blocks(limit: Int, offset: Int): [Block!]!
  block(hash: String!): Block
  transactions(limit: Int, offset: Int): [Transaction!]!
  transaction(hash: String!): Transaction
  accounts(limit: Int, offset: Int): [Account!]!
  account(address: String!): Account
}

type Block {
  hash: String!
  number: Int!
  timestamp: Int!
  transactions: [Transaction!]!
  miner: Account!
}

type Transaction {
  hash: String!
  block: Block!
  from: Account!
  to: Account!
  value: BigInt!
  gas: BigInt!
  gasPrice: BigInt!
  nonce: Int!
}

type Account {
  address: String!
  balance: BigInt!
  transactionCount: Int!
}

scalar BigInt