name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    - name: Use Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'
    - run: npm ci
    - run: npm run test
    - run: npm run build
    
    - name: Deploy to production
      if: github.ref == 'refs/heads/main'
      env:
        HOST_USERNAME: ${{ secrets.HOST_USERNAME }}
        HOST_PASSWORD: ${{ secrets.HOST_PASSWORD }}
      run: |
        ssh $HOST_USERNAME@example.com 'cd /path/to/clawchain && git pull && npm install && npm run build && pm2 restart clawchain'