name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Use Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '16'
        
    - name: Install dependencies
      run: |
        cd backend
        npm ci
        cd ../frontend
        npm ci
        
    - name: Run tests
      run: |
        cd backend
        npm test
        cd ../frontend
        npm test
        
    - name: Build backend
      run: |
        cd backend
        npm run build
        
    - name: Build frontend
      run: |
        cd frontend
        npm run build
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v2
      with:
        name: dist
        path: |
          backend/dist
          frontend/dist
          
  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    
    - name: Download artifacts
      uses: actions/download-artifact@v2
      with:
        name: dist
        
    - name: Deploy to production
      env:
        HOST_USERNAME: ${{ secrets.HOST_USERNAME }}
        HOST_PASSWORD: ${{ secrets.HOST_PASSWORD }}
        HOST_IP: ${{ secrets.HOST_IP }}
      run: |
        scp -r backend/dist $HOST_USERNAME@$HOST_IP:/path/to/backend
        scp -r frontend/dist $HOST_USERNAME@$HOST_IP:/path/to/frontend
        ssh $HOST_USERNAME@$HOST_IP 'systemctl restart claw-backend claw-frontend'